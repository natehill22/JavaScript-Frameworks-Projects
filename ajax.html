<!DOCTYPE html>
<html>
    <head>
      <meta content = "text/html"; charset = ISO-8859-1" http-equiv = "content-type">
      <title>Dad Jokes</title>
   </head>
	
   <body>
      <h1>Would you like to hear a dad joke?</h1>
        <p id="dadjoke"></p>
        <button id="jokeButton" type = "button" onclick = "loadJSON()">Sure</button>

      <script type = "application/javascript">
         function loadJSON() {
            var data_file = "https://icanhazdadjoke.com/"; //API location to pull dad jokes
            var http_request = new XMLHttpRequest();
            try{
               // Opera 8.0+, Firefox, Chrome, Safari
               http_request = new XMLHttpRequest();
            }catch (e) {
               // Internet Explorer Browsers
               try{
                  http_request = new ActiveXObject("Msxml2.XMLHTTP");
					
               }catch (e) {
				
                  try{
                     http_request = new ActiveXObject("Microsoft.XMLHTTP");
                  }catch (e) {
                     // Something went wrong
                     alert("Your browser broke!");
                     return false;
                  }
					
               }
            }
			
            http_request.onreadystatechange = function() {
			
               if (http_request.readyState == 4 ) {
                  //Handles HTTP status errors (404, 500, 503)
                  if (http_request.status === 200) { 
                     try {
                        //Parses response XMLHttpRequest data into JSON once readyState is Done
                        var jsonObj = JSON.parse(http_request.responseText);

                        if (jsonObj && jsonObj.joke) {
                           //Displays the joke JSON value in the HTML dadjoke section
                           document.getElementById('dadjoke').innerHTML = jsonObj.joke;
                           updateButtonText(); 
                        } else {
                           //Handle API key/property verification issues
                           displayError("Unexpected API response format.");
                        }
                     } catch (parseError) {
                        //Handles unexpected JSON errors
                        displayError("Failed to parse API data.");
                     }
                  } else {
                     //Handles status errors
                     displayError("Server error! Status Code: " + http_request.status);
                  }
               }
            };

            //Handles network level failures
            http_request.onerror = function() {
               displayError("Network connection failed. Check your internet link.");
            };
			
            http_request.open("GET", data_file, true); //Gets API data asyncronously
            http_request.setRequestHeader("Accept", "application/json"); //Adjusts headers to pull in JSON format
            http_request.send();
         }
		
         //Displays errors and error messages when applicable
         function displayError(message) {
            var jokeDisplay = document.getElementById("dadjoke");
            jokeDisplay.style.color = "red";
            jokeDisplay.innerHTML = "Error: " + message;
         }

         //Updates button text if it has already been clicked
         let isClicked = false;
         const myButton = document.getElementById('jokeButton');

         function updateButtonText() {
            if (!isClicked) { //Checks previously checked status upon click, if true, update text, if not update to true
                myButton.textContent = "How 'bout another?";
                isClicked = true;
            }
         };
        </script>
   </body>
		
</html>
