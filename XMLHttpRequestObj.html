<!DOCTYPE html>
<html>
<body>
<h2>XHR Test (using local file)</h2>
<button type="button" onclick="loadText()">Type of Flying Machine</button>
<p id="loadZone"></p>

<script>
function loadText() {
    const xhttp = new XMLHttpRequest(); //Creates instance of the XHR object
    xhttp.onload = function() { 
        if (this.status == 200) { //When loaded, replace the p tag with loadZone id
            const zepObj = JSON.parse(this.responseText);
            document.getElementById("loadZone").innerHTML = zepObj.type;
        }
    };
    xhttp.open("GET", 'http://127.0.0.1:5500/XMLHttpInfo.txt'); //Configures request type an target file
    xhttp.send(); //Dispatches request to file
    //Functionality was accomplished using the Live Server Extension in VSCode
}
</script>

</body>
</html>
