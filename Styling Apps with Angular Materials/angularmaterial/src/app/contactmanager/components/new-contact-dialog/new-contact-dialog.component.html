<!--Displays the new contact pop-up modal and its contents-->
<h2 mat-dialog-title>Add new contact</h2>
<mat-dialog-content>
    <div class="example-container">
        <mat-form-field appearance="fill">
            <mat-label>Avatar</mat-label>
            <mat-select [(ngModel)]="user.avatar"> <!--Selecting an option updates user.avatar in TS file-->
                <mat-select-trigger>
                    <mat-icon svgIcon="{{user.avatar}}"></mat-icon> {{user.avatar}}  <!--Shows selected icon (after selection)-->
                </mat-select-trigger>
                <mat-option *ngFor="let avatar of avatars" [value]="avatar">
                    <mat-icon svgIcon="{{avatar}}"></mat-icon> {{avatar}} <!--Displays list of icons and icon names-->
                </mat-option>
            </mat-select>
        </mat-form-field>
        <br>
        <mat-form-field appearance="fill">
            <mat-label>Name</mat-label>
            <input matInput [formControl]="name" required> <!--Syncs element value and data, validates, and requires an answer-->
            <mat-error *ngIf="name.invalid">{{getErrorMessage()}}</mat-error> <!--Show error if invalid-->
        </mat-form-field>
        <br>
        <mat-form-field appearance="fill">
            <mat-label>Born</mat-label>
            <input matInput [matDatepicker]="picker" [(ngModel)]="user.birthDate"> <!--Connects input field to calendar pop-up and updates user.birthdate in TS file-->
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle> <!--Renders clickable calendar icon in input-->
            <mat-datepicker #picker></mat-datepicker> <!--Defines floating calendar panel-->
        </mat-form-field>
        <br>
        <mat-form-field appearance="fill">
            <mat-label>Bio</mat-label>
            <textarea matInput [(ngModel)]="user.bio"></textarea> <!--Selecting an option updates user.bio in TS file-->
        </mat-form-field>
    </div>

</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button color="primary" (click)="save()"> <!--Opens save method upon button clicl-->
        <mat-icon>save</mat-icon> Save
    </button>
    <button mat-button color="primary" (click)="dismiss()"> <!--Opens dismiss method upon button clicl-->
        <mat-icon>cancel</mat-icon> Cancel
    </button>
</mat-dialog-actions>
