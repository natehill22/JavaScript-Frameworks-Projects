<!DOCTYPE html>

<html ng-app="githubViewer">
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!--Utilizes data-bindings within the JS file to display data on HTML-->
    <div ng-controller="MainCtrl">
      <h1>{{message}}</h1>
      <div>{{error}}</div>
      <div>
        <div>
          Name: {{user.name}}
        </div>
        <div>
          Location: {{user.location}}
        </div>
        <div>
          <img ng-src="{{user.avatar_url}}" title="{{user.name}}">
        </div>

        <div>{{person.firstName}} {{person.lastName}}</div>
        <img ng-src="{{person.imageSrc}}" title="{{person.firstName}} {{person.lastName}}">
      </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <script src="controller-module.js"></script>
  </body>
</html>
